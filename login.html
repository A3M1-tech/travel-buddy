<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBuddy - Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="particles" id="particles"></div>

    <!-- BACK BUTTON -->
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-container">
        <!-- LOGIN FORM -->
        <div class="auth-card" id="loginCard">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-route"></i>
                    <span>Travel<span class="highlight">Buddy</span></span>
                </div>
                <h2>Welcome Back! 👋</h2>
                <p>Login to continue your adventure</p>
            </div>
            <form class="auth-form" id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Password" required id="loginPassword">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                </div>
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-submit">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            <div class="auth-divider">
                <span>or continue with</span>
            </div>
            <div class="social-login">
                <button class="social-btn google">
                    <i class="fab fa-google"></i> Google
                </button>
            </div>
            <p class="auth-switch">
                Don't have an account?
                <a href="#" onclick="showSignup()">Sign Up</a>
            </p>
        </div>

        <!-- SIGNUP FORM -->
        <div class="auth-card hidden" id="signupCard">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-route"></i>
                    <span>Travel<span class="highlight">Buddy</span></span>
                </div>
                <h2>Join The Squad! 🎒</h2>
                <p>Create your account (Invite only)</p>
            </div>
            <form class="auth-form" id="signupForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-university"></i>
                    <input type="text" placeholder="College Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="tel" placeholder="Phone Number" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Create Password" required id="signupPassword">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('signupPassword', this)"></i>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" placeholder="Invite Code (from your friend)" required>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar"><div class="strength-fill"></div></div>
                    <span class="strength-text">Password strength</span>
                </div>
                <button type="submit" class="btn-submit">
                    <span>Create Account</span>
                    <i class="fas fa-rocket"></i>
                </button>
            </form>
            <p class="auth-switch">
                Already have an account?
                <a href="#" onclick="showLogin()">Login</a>
            </p>
        </div>
    </div>

    <script src="scripts/login.js"></script>
</body>
</html>
